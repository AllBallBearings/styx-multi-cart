<svg width="1024" height="1024" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Styx Multi-Cart logo</title>
  <desc id="desc">Three orange shopping carts above blue river waves on a dark rounded square.</desc>
  <defs>
    <linearGradient id="tile" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17212d"/>
      <stop offset="0.58" stop-color="#101923"/>
      <stop offset="1" stop-color="#0b121b"/>
    </linearGradient>
    <linearGradient id="cart" x1="4" y1="6" x2="28" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffc34d"/>
      <stop offset="0.42" stop-color="#ff9900"/>
      <stop offset="1" stop-color="#f6a100"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="19" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#274e70"/>
      <stop offset="0.52" stop-color="#5f7686"/>
      <stop offset="1" stop-color="#7f8f9c"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="19" x2="32" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6cc7ff"/>
      <stop offset="0.55" stop-color="#9bd9ff"/>
      <stop offset="1" stop-color="#d9f2ff"/>
    </linearGradient>
    <filter id="cartShadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0.55" stdDeviation="0.22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#tile)"/>

  <g filter="url(#cartShadow)">
    <g stroke="url(#cart)" stroke-width="1.18" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M12 8.6 L19 8.6 L18.3 11.8 L12.7 11.8 Z"/>
      <path d="M12 8.6 L10.5 7.3"/>
    </g>
    <circle cx="13.7" cy="13.3" r="0.92" fill="url(#cart)"/>
    <circle cx="17.3" cy="13.3" r="0.92" fill="url(#cart)"/>
  </g>

  <g filter="url(#cartShadow)">
    <g stroke="url(#cart)" stroke-width="1.18" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M4 14.4 L11 14.4 L10.3 17.6 L4.7 17.6 Z"/>
      <path d="M4 14.4 L2.5 13.1"/>
    </g>
    <circle cx="5.9" cy="19.1" r="0.92" fill="url(#cart)"/>
    <circle cx="9.1" cy="19.1" r="0.92" fill="url(#cart)"/>
  </g>

  <g filter="url(#cartShadow)">
    <g stroke="url(#cart)" stroke-width="1.18" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M21 14.4 L28 14.4 L27.3 17.6 L21.7 17.6 Z"/>
      <path d="M21 14.4 L19.5 13.1"/>
    </g>
    <circle cx="22.9" cy="19.1" r="0.92" fill="url(#cart)"/>
    <circle cx="26.1" cy="19.1" r="0.92" fill="url(#cart)"/>
  </g>

  <path d="M0 19.8 Q 4 18.4, 8 19.8 T 16 19.8 T 24 19.8 T 32 19.8 L 32 32 L 0 32 Z" fill="url(#river)" opacity="0.78"/>
  <path d="M0 19.8 Q 4 18.4, 8 19.8 T 16 19.8 T 24 19.8 T 32 19.8" stroke="url(#wave)" stroke-width="1.05" fill="none" stroke-linecap="round"/>
  <path d="M0 23 Q 4 22, 8 23 T 16 23 T 24 23 T 32 23" stroke="url(#wave)" stroke-width="0.82" fill="none" stroke-linecap="round" opacity="0.62"/>
  <path d="M0 25.9 Q 4 25, 8 25.9 T 16 25.9 T 24 25.9 T 32 25.9" stroke="url(#wave)" stroke-width="0.72" fill="none" stroke-linecap="round" opacity="0.46"/>
  <path d="M0 28.5 Q 4 27.8, 8 28.5 T 16 28.5 T 24 28.5 T 32 28.5" stroke="url(#wave)" stroke-width="0.62" fill="none" stroke-linecap="round" opacity="0.34"/>
</svg>
