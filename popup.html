<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Styx Multi-Cart</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="mc-header">
      <div class="mc-brand">
        <svg class="mc-logo" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Background tile -->
          <rect width="32" height="32" rx="7" fill="#131a22" />

          <!-- Top cart (apex of the pyramid) -->
          <g stroke="#ff9900" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M12 8.6 L19 8.6 L18.3 11.8 L12.7 11.8 Z" />
            <path d="M12 8.6 L10.5 7.3" />
          </g>
          <circle cx="13.7" cy="13.3" r="0.9" fill="#ff9900" />
          <circle cx="17.3" cy="13.3" r="0.9" fill="#ff9900" />

          <!-- Bottom-left cart — centered vertically, above the river -->
          <g stroke="#ff9900" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M4 14.4 L11 14.4 L10.3 17.6 L4.7 17.6 Z" />
            <path d="M4 14.4 L2.5 13.1" />
          </g>
          <circle cx="5.9" cy="19.1" r="0.9" fill="#ff9900" />
          <circle cx="9.1" cy="19.1" r="0.9" fill="#ff9900" />

          <!-- Bottom-right cart — shifted right so handle clears top cart wheel -->
          <g stroke="#ff9900" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M21 14.4 L28 14.4 L27.3 17.6 L21.7 17.6 Z" />
            <path d="M21 14.4 L19.5 13.1" />
          </g>
          <circle cx="22.9" cy="19.1" r="0.9" fill="#ff9900" />
          <circle cx="26.1" cy="19.1" r="0.9" fill="#ff9900" />

          <!-- The river Styx — raised slightly so it laps the wheels -->
          <path d="M0 19.8 Q 4 18.4, 8 19.8 T 16 19.8 T 24 19.8 T 32 19.8 L 32 32 L 0 32 Z" fill="#1a3a5c" opacity="0.55" />
          <path d="M0 19.8 Q 4 18.4, 8 19.8 T 16 19.8 T 24 19.8 T 32 19.8" stroke="#5db5ff" stroke-width="1" fill="none" stroke-linecap="round" />
          <path d="M0 23 Q 4 22, 8 23 T 16 23 T 24 23 T 32 23" stroke="#5db5ff" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.55" />
          <path d="M0 25.9 Q 4 25, 8 25.9 T 16 25.9 T 24 25.9 T 32 25.9" stroke="#5db5ff" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.38" />
          <path d="M0 28.5 Q 4 27.8, 8 28.5 T 16 28.5 T 24 28.5 T 32 28.5" stroke="#5db5ff" stroke-width="0.6" fill="none" stroke-linecap="round" opacity="0.25" />
        </svg>
        <div class="mc-brand-text">
          <h1>Styx Multi-Cart</h1>
          <p class="mc-tag">Cart Management to Hell and back</p>
        </div>
      </div>
    </header>

    <section class="mc-save-block">
      <label for="mc-name" class="mc-label">Save current Amazon cart as</label>
      <div class="mc-save-row">
        <input
          id="mc-name"
          type="text"
          class="mc-input"
          placeholder="e.g. Birthday gifts"
          autocomplete="off"
          maxlength="60"
        />
        <button id="mc-save" class="mc-btn mc-btn-primary" type="button">
          Save
        </button>
      </div>
      <div class="mc-save-actions">
        <button
          id="mc-save-and-clear"
          class="mc-btn mc-btn-ghost"
          type="button"
          title="Save the current cart, then empty it from Amazon"
        >
          Save &amp; clear
        </button>
        <button
          id="mc-clear"
          class="mc-btn mc-btn-ghost mc-btn-danger"
          type="button"
          title="Remove every item from your active Amazon cart"
        >
          Clear cart
        </button>
      </div>
    </section>

    <section class="mc-list-block">
      <div class="mc-list-header">
        <h2>Saved carts</h2>
        <span id="mc-list-count" class="mc-count">0</span>
      </div>
      <ul id="mc-list" class="mc-list" aria-live="polite"></ul>
      <p id="mc-empty" class="mc-empty" hidden>
        No saved carts yet. Open your Amazon cart, give it a name above, and
        hit Save.
      </p>
    </section>

    <div id="mc-toast" class="mc-toast" role="status" aria-live="polite" hidden></div>

    <details id="mc-debug" class="mc-debug">
      <summary class="mc-debug-toggle">Debug</summary>
      <div class="mc-debug-body">
        <button id="mc-diagnose" class="mc-btn mc-btn-ghost mc-btn-sm" type="button">
          Run cart diagnostics
        </button>
        <pre id="mc-debug-output" class="mc-debug-output"></pre>
      </div>
    </details>

    <template id="mc-item-template">
      <li class="mc-item">
        <div class="mc-item-main">
          <div class="mc-item-name-row">
            <span class="mc-item-name"></span>
            <span class="mc-item-count"></span>
          </div>
          <div class="mc-item-meta"></div>
          <div class="mc-item-thumbs"></div>
        </div>
        <div class="mc-item-actions">
          <button class="mc-btn mc-btn-primary mc-btn-sm" data-action="restore">
            Restore
          </button>
          <button class="mc-btn mc-btn-ghost mc-btn-sm" data-action="rename">
            Rename
          </button>
          <button
            class="mc-btn mc-btn-ghost mc-btn-sm mc-btn-danger"
            data-action="delete"
          >
            Delete
          </button>
        </div>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
